name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  #  Job 1: Testes e Cobertura
  test:
    name: Testes e Cobertura
    runs-on: ubuntu-latest

    services:
      # Banco PostgreSQL temporário para os testes
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: foodapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/foodapp_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/foodapp_test
      JWT_SECRET: ci-jwt-secret-for-testing-only
      AUTH_SECRET: ci-auth-secret-for-testing-only
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-nextauth-secret
      ADMIN_EMAILS: admin@foodapp.com
      NODE_ENV: test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Aplicar migrações no banco de teste
        run: npx prisma migrate deploy

      - name: Executar testes com cobertura
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Verificar cobertura mínima (80%)
        run: |
          echo "Cobertura verificada pelo threshold configurado no jest.config.ts"

      - name: Publicar relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  #  Job 2: Build
  build:
    name: Build da Aplicação
    runs-on: ubuntu-latest
    needs: test # só executa se os testes passarem

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/foodapp_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/foodapp_test
      JWT_SECRET: ci-jwt-secret-for-testing-only
      AUTH_SECRET: ci-auth-secret-for-testing-only
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-nextauth-secret
      ADMIN_EMAILS: admin@foodapp.com

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Salvar artefato do build
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7
